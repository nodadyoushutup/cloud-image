name: Build and Release Image

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag for the release"
        required: true

env:
  PACKER_LOG: 1
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        id: checkout_build
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate tag uniqueness
        id: validate_tag
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Error: Tag $VERSION already exists. Please use a unique version tag."
            exit 1
          fi

      - name: Install packages
        id: apt_install
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-system xorriso jq

      - name: Packer setup
        uses: hashicorp/setup-packer@main
        id: packer_setup
        with:
          version: "latest"

      - name: Packer init
        id: packer_init
        run: |
          packer init cloud_image.pkr.hcl

      - name: Packer validate
        id: packer_validate
        run: |
          packer validate cloud_image.pkr.hcl

      - name: Packer build
        id: packer_build
        run: |
          packer build cloud_image.pkr.hcl

      - name: Generate checksum
        id: generate_checksum
        run: |
          mkdir -p output
          CHECKSUM_FILE=output/cloud_image_x86_64_jammy.img.sha256
          sha256sum output/cloud_image_x86_64_jammy.img > $CHECKSUM_FILE

      - name: Upload artifacts to workspace
        uses: actions/upload-artifact@v4
        id: artifact_upload
        with:
          name: artifact
          path: |
            output/cloud_image_x86_64_jammy.img
            output/cloud_image_x86_64_jammy.img.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        id: checkout_release
        uses: actions/checkout@v4

      - name: Download artifacts
        id: artifact_download
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Create GitHub release
        id: release_create
        run: |
          echo "Creating release for tag: ${{ github.event.inputs.version }}"
          gh release create ${{ github.event.inputs.version }} --title "${{ github.event.inputs.version }}" --notes "Automated release of the cloud image"

      - name: Upload artifact to release
        id: release_upload_artifact
        run: |
          ARTIFACT_PATH=output/cloud_image_x86_64_jammy.img
          if [[ ! -f "$ARTIFACT_PATH" ]]; then
            echo "Error: Artifact not found: $ARTIFACT_PATH"
            exit 1
          fi
          echo "Uploading artifact: $ARTIFACT_PATH"
          gh release upload "${{ github.event.inputs.version }}" "$ARTIFACT_PATH"
      
      - name: Upload checksum to release
        id: release_upload_checksum
        run: |
          CHECKSUM_FILE=output/cloud_image_x86_64_jammy.img.sha256
          if [[ ! -f "$CHECKSUM_FILE" ]]; then
            echo "Error: Checksum file not found: $CHECKSUM_FILE"
            exit 1
          fi
          echo "Uploading checksum: $CHECKSUM_FILE"
          gh release upload "${{ github.event.inputs.version }}" "$CHECKSUM_FILE"
