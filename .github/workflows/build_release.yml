name: Build and Release Image

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag for the release"
        required: true
      output_dir:
        description: "Output directory"
        required: true
        default: output
        type: choice
        options:
          - output
      file_name:
        description: "File name"
        required: true
        default: cloud_image_x86_64_jammy
        type: choice
        options:
          - cloud_image_x86_64_jammy

env:
  PACKER_LOG: 1
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  VERSION: "${{ github.ref_name || github.event.inputs.version }}"
  OUTPUT_DIR: ${{ github.event.inputs.output_dir }}
  FILE_NAME: ${{ github.event.inputs.file_name }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        id: checkout_build
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate tag uniqueness
        id: validate_tag
        run: |
          if git rev-parse "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Error: Tag ${VERSION} already exists"
            exit 1
          fi

      - name: Install packages
        id: apt_install
        run: |
          sudo apt-get update && sudo apt-get install -y jq qemu-system xorriso

      - name: Packer setup
        uses: hashicorp/setup-packer@main
        id: packer_setup
        with:
          version: "latest"

      - name: Packer init
        id: packer_init
        run: |
          packer init cloud_image.pkr.hcl

      - name: Packer validate
        id: packer_validate
        run: |
          packer validate cloud_image.pkr.hcl

      - name: Packer build
        id: packer_build
        run: |
          packer build \
          -var="output_dir=${OUTPUT_DIR}" \
          -var="file_name=${FILE_NAME}" \
          cloud_image.pkr.hcl

      - name: Generate checksum
        id: generate_checksum
        run: |
          mkdir -p "${OUTPUT_DIR}"
          sha256sum "${OUTPUT_DIR}/${FILE_NAME}.img" > "${OUTPUT_DIR}/${FILE_NAME}.img.sha256"

      - name: Upload artifacts to workspace
        uses: actions/upload-artifact@v4
        id: artifact_upload
        with:
          name: artifact
          path: |
            "${OUTPUT_DIR}/${FILE_NAME}.img"
            "${OUTPUT_DIR}/${FILE_NAME}.img.sha256"

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        id: checkout_release
        uses: actions/checkout@v4

      - name: Download artifacts
        id: artifact_download
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Create GitHub release
        id: release_create
        run: |
          echo "Creating release for tag: ${VERSION}"
          gh release create ${VERSION} --title "${VERSION}" --notes "Automated release of the cloud image"

      - name: Upload artifact to release
        id: release_upload_artifact
        run: |
          if [[ ! -f "${OUTPUT_DIR}/${FILE_NAME}.img" ]]; then
            echo "Error: Artifact not found: "${OUTPUT_DIR}/${FILE_NAME}.img"
            exit 1
          fi
          echo "Uploading artifact: "${OUTPUT_DIR}/${FILE_NAME}.img"
          gh release upload "$VERSION" "${OUTPUT_DIR}/${FILE_NAME}.img"
      
      - name: Upload checksum to release
        id: release_upload_checksum
        run: |
          if [[ ! -f "${OUTPUT_DIR}/${FILE_NAME}.img.sha256" ]]; then
            echo "Error: Checksum file not found: "${OUTPUT_DIR}/${FILE_NAME}.img.sha256"
            exit 1
          fi
          echo "Uploading checksum: "${OUTPUT_DIR}/${FILE_NAME}.img.sha256"
          gh release upload "$VERSION" "${OUTPUT_DIR}/${FILE_NAME}.img.sha256"
