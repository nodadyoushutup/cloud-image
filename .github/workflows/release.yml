name: Build and Release Image

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+" # Trigger on semantic version tags
  workflow_dispatch:
    inputs:
      tag:
        description: "Semantic version tag for the release"
        required: true
      ubuntu_codename:
        description: "Select the Ubuntu codename version"
        required: true
        default: "jammy"
        type: choice
        options:
          - jammy
env:
  PACKER_LOG: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-system xorriso jq
          echo "DEBUG: Installed required packages."

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        id: setup
        with:
          version: "latest"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag
        id: validate_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Invalid tag format. Use semantic versioning (e.g., 1.0.0)."
            exit 1
          fi
          echo "DEBUG: Tag format is valid."
          git fetch --tags
          if git tag --list | grep -q "^${TAG}$"; then
            echo "Error: Tag $TAG already exists. Please use a unique version tag."
            exit 1
          fi
          echo "Validated tag: $TAG"

      - name: Packer init
        run: |
          echo "DEBUG: Initializing packer..."
          packer init cloud_image.pkr.hcl
          echo "DEBUG: Packer initialized."

      - name: Packer build
        run: |
          echo "DEBUG: Starting packer build for tag $TAG."
          packer build -var "build_type=remote" -var "ubuntu_codename=${{ github.event.inputs.ubuntu_codename }}" cloud_image.pkr.hcl
          echo "DEBUG: Packer build completed."

      - name: Upload artifacts to workspace
        uses: actions/upload-artifact@v3
        with:
          name: built-images
          path: |
            echo "DEBUG: Uploading artifacts."
            output-${{ github.event.inputs.ubuntu_codename }}/nodadyoushutup-cloud-image-${{ github.event.inputs.ubuntu_codename }}.img
            echo "DEBUG: Artifact uploaded."

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: built-images

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating release for tag: ${{ github.event.inputs.tag }}"
          gh release create ${{ github.event.inputs.tag }} --title "${{ github.event.inputs.tag }}" --notes "Automated release of the cloud images."

      - name: Upload artifact to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_PATH=$(ls output/nodadyoushutup-cloud-image-${{ github.event.inputs.ubuntu_codename }}.img | head -n 1)
          if [[ -z "$ARTIFACT_PATH" ]]; then
            echo "No artifact found to upload."
            exit 1
          fi
          echo "Uploading artifact: $ARTIFACT_PATH"
          gh release upload "${{ github.event.inputs.tag }}" "$ARTIFACT_PATH"
